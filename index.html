<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess The Flag</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NOISE OVERLAY -->
  <div class="noise"></div>

  <!-- FLOATING ORBS -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- ===== START SCREEN ===== -->
  <div id="screen-start" class="screen active">
    <div class="start-inner">
      <div class="logo-badge">🌍</div>
      <h1 class="title">GUESS<br/><span>THE FLAG</span></h1>
      <p class="subtitle">Type the name of the country that matches the flag.</p>

      <div class="username-wrap">
        <label for="username-input">Your name</label>
        <input id="username-input" type="text" placeholder="Enter username…" maxlength="20" autocomplete="off"/>
      </div>

      <button id="btn-start" class="btn-primary">
        <span>Start Game</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <div class="leaderboard-preview" id="leaderboard-preview">
        <h3>🏆 Top Scores</h3>
        <ol id="lb-list-start"></ol>
      </div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="screen-game" class="screen">
    <div class="game-header">
      <div class="stat-box">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score-display">0</span>
      </div>
      <div class="stat-box center-stat">
        <span class="stat-label">Flag</span>
        <span class="stat-value" id="flag-counter">1 / 10</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="timer-display">0:00</span>
      </div>
    </div>

    <div class="flag-stage" id="flag-stage">
      <div class="flag-frame" id="flag-frame">
        <img id="flag-img" src="" alt="Country flag" draggable="false"/>
        <div class="flag-shimmer"></div>
      </div>
      <div class="feedback-overlay" id="feedback-overlay"></div>
    </div>

    <div class="answer-section">
      <div class="input-row">
        <input id="answer-input" type="text" placeholder="Type country name…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button id="btn-submit" class="btn-primary">
          <span>Submit</span>
        </button>
      </div>
      <div class="hint-text" id="hint-text"></div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <!-- ===== RESULT SCREEN ===== -->
  <div id="screen-result" class="screen">
    <div class="result-inner">
      <div class="result-trophy" id="result-trophy">🏆</div>
      <h2 class="result-title" id="result-title">Round Complete!</h2>

      <div class="result-stats">
        <div class="result-stat">
          <span class="rs-label">Score</span>
          <span class="rs-value" id="final-score">0 / 10</span>
        </div>
        <div class="result-stat">
          <span class="rs-label">Time</span>
          <span class="rs-value" id="final-time">0:00</span>
        </div>
        <div class="result-stat">
          <span class="rs-label">Accuracy</span>
          <span class="rs-value" id="final-accuracy">0%</span>
        </div>
      </div>

      <div class="leaderboard-full">
        <h3>🏆 Leaderboard</h3>
        <ol id="lb-list-result"></ol>
      </div>

      <button id="btn-again" class="btn-primary">
        <span>Play Again</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
